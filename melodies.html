          this.dom.searchBtn = document.getElementById('menoraScopeSearchBtn');
          this.dom.searchModal = document.getElementById('menoraSearchModal');
          this.dom.closeSearchBtn = document.getElementById('menoraCloseSearchBtn');
          this.dom.searchInput = document.getElementById('menoraModalSearchInput');
          this.dom.searchResults = document.getElementById('menoraModalSearchResults');

          this.dom.playlistBtn = document.getElementById('menoraScopeSelectBtn');
          this.dom.playlistSelectedLabel = document.getElementById('menoraScopeSelectedLabel');
          this.dom.playlistModal = document.getElementById('menoraPlaylistModal');
          this.dom.closePlaylistBtn = document.getElementById('menoraClosePlaylistBtn');
          this.dom.playlistModalList = document.getElementById('menoraPlaylistModalList');

          this.dom.viewLyricsBtn = document.getElementById('menoraViewLyricsBtn');

          this.dom.lyricsOverlay = document.getElementById('menoraLyricsOverlay');
          this.dom.lyricsHeaderTitle = document.getElementById('menoraLyricsHeaderTitle');
          this.dom.lyricsCloseBtn = document.getElementById('menoraLyricsCloseBtn');
          this.dom.lyricsTabStrip = document.getElementById('menoraLyricsTabStrip');
          this.dom.lyricsSongTitle = document.getElementById('menoraLyricsSongTitle');
          this.dom.lyricsSongText = document.getElementById('menoraLyricsSongText');
          this.dom.lyricsBodyScroll = document.getElementById('menoraLyricsBodyScroll');

          if (!this.dom.engine || !this.dom.title) return;
          const self = this;
          const tamilUrl = 'https://raw.githubusercontent.com/menoradotin/MENORA/refs/heads/main/playlist.json?v=' + Date.now();
          const englishUrl = 'https://raw.githubusercontent.com/menoradotin/MENORA/refs/heads/main/playlist1.json?v=' + Date.now();

          Promise.all([
            fetch(tamilUrl).then(r => r.json()),
            fetch(englishUrl).then(r => r.json())
          ])
          .then(([tamilData, englishData]) => {
            self.tracks = tamilData.concat(englishData);
            self.renderPlaylistOptions(true); 
            self.bindEvents();
            self.setupSearchEngine(); 
          })
          .catch(err => {
            console.error("Error loading tracks:", err);
          });
          
          fetch('https://raw.githubusercontent.com/menoradotin/MENORA/refs/heads/main/greetings.json?v=' + Date.now())
            .then(response => response.json())
            .then(data => {
              const modal = document.getElementById('menoraGreetModal');
              const msgBox = document.getElementById('menoraGreetMessage');
              const closeBtn = document.getElementById('menoraGreetCloseBtn');
              if (data.message && msgBox) msgBox.innerHTML = data.message;
              if (modal) modal.style.display = 'flex';
              if (closeBtn) closeBtn.onclick = () => { modal.style.display = 'none'; };
              if (modal) modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
            })
            .catch(err => console.error("Greeting load failed:", err));
        },

        bindEvents: function() {
          const self = this;
          if(this.dom.playPause) this.dom.playPause.onclick = () => self.handlePlaybackToggle();
          if(this.dom.prevBtn) this.dom.prevBtn.onclick = () => self.playPreviousTrack();
          if(this.dom.nextBtn) this.dom.nextBtn.onclick = () => self.playNextTrack();
          if(this.dom.bar) this.dom.bar.oninput = () => self.handleManualSeeking();
          if(this.dom.share) this.dom.share.onclick = () => self.handleShareIntent();

          if(this.dom.btnTamil) this.dom.btnTamil.onclick = () => self.switchLanguageScope('tamil');
          if(this.dom.btnEnglish) this.dom.btnEnglish.onclick = () => self.switchLanguageScope('english');

          if(this.dom.playlistBtn) this.dom.playlistBtn.onclick = () => self.openPlaylistModal();
          if(this.dom.closePlaylistBtn) this.dom.closePlaylistBtn.onclick = () => self.closePlaylistModal();
          if(this.dom.playlistModal) this.dom.playlistModal.onclick = (e) => { if (e.target === self.dom.playlistModal) self.closePlaylistModal(); };

          if(this.dom.lyricsCloseBtn) this.dom.lyricsCloseBtn.onclick = () => self.closeLyricsPanel();

          if(this.dom.viewLyricsBtn) this.dom.viewLyricsBtn.onclick = () => {
            if(!self.currentLyricsGenre) return;
            const playingTrack = self.currentPlaySet[self.currentIndex];
            let targetSongIdx = 0;
            if (playingTrack && playingTrack.genre === self.currentLyricsGenre) {
              const currentActualSongIdx = self.currentPlaySet.slice(0, self.currentIndex + 1).filter(t => !t.isCredit).length - 1;
              targetSongIdx = currentActualSongIdx >= 0 ? currentActualSongIdx : 0;
            }
            self.openLyricsPanel(self.currentLyricsGenre, targetSongIdx);
          };

          if(this.dom.engine) {
            this.dom.engine.addEventListener('timeupdate', () => {
              if(self.dom.engine.duration) {
                const progress = (self.dom.engine.currentTime / self.dom.engine.duration) * 100;
                if(self.dom.bar) self.dom.bar.value = progress;
                if(self.dom.current) self.dom.current.textContent = self.formatTrackTime(self.dom.engine.currentTime);
              }
            });
            this.dom.engine.addEventListener('loadedmetadata', () => {
              if(self.dom.duration) self.dom.duration.textContent = self.formatTrackTime(self.dom.engine.duration);
            });
            this.dom.engine.addEventListener('ended', () => {
              self.playNextTrack();
            });
          }
        },

        setupSearchEngine: function() {
          const self = this;
          if (!this.dom.searchBtn || !this.dom.searchModal) return;

          this.dom.searchBtn.onclick = () => {
            self.dom.searchModal.style.display = 'flex';
            self.dom.searchInput.value = '';
            self.dom.searchResults.innerHTML = '<div style="padding: 16px; color: #fffacd; font-size: 14px; text-align: center; font-weight: bold;">Come, let us shout aloud to the Rock of our salvation. — Psalm 95:1</div>';
            setTimeout(() => self.dom.searchInput.focus(), 50);
          };

          const closeAction = () => { self.dom.searchModal.style.display = 'none'; };
          this.dom.closeSearchBtn.onclick = closeAction;
          this.dom.searchModal.onclick = (e) => { if (e.target === self.dom.searchModal) closeAction(); };

          this.dom.searchInput.oninput = function(e) {
            const query = e.target.value.toLowerCase().trim();
            self.dom.searchResults.innerHTML = '';

            if (query === '') {
              self.dom.searchResults.innerHTML = '<div style="padding: 16px; color: #fffacd; font-size: 14px; text-align: center; font-weight: bold;">Come, let us shout aloud to the Rock of our salvation. — Psalm 95:1</div>';
              return;
            }

            const matches = self.tracks.filter(track => {
              if (track.isCredit || !track.url) return false;
              const titleMatch = track.title ? track.title.toLowerCase().includes(query) : false;
              const metaMatch = track.meta ? track.meta.toLowerCase().includes(query) : false;
              return titleMatch || metaMatch;
            });

            if (matches.length === 0) {
              self.dom.searchResults.innerHTML = '<div style="padding: 20px; color: rgba(255,253,244,0.6); font-size: 14px; text-align: center;">No matching tracks found</div>';
              return;
            }

            matches.forEach(track => {
              const row = document.createElement('div');
              row.style.cssText = "padding: 10px 8px; border-bottom: 1px solid rgba(255, 253, 244, 0.1); cursor: pointer; transition: all 0.2s; color: #FFFDF4; font-family: 'Trebuchet MS', Arial; font-size: 15px; font-weight: bold;";
              
              let playlistLabel = self.findPlaylistLabel(track.genre);

              const metaInfo = track.meta ? ` &bull; ${track.meta}` : "";
              row.innerHTML = `<div>${track.title}</div><div style="font-size: 11px; color: #468062; font-weight: normal; margin-top: 2px;">${playlistLabel}${metaInfo}</div>`;
              
              row.onmouseover = () => { row.style.background = "rgba(70, 128, 98, 0.15)"; row.style.paddingLeft = "12px"; };
              row.onmouseout = () => { row.style.background = "transparent"; row.style.paddingLeft = "8px"; };

              row.onclick = () => {
                const targetLang = self.flattenLeaves(self.playlistRegistry.tamil).some(p => p.value === track.genre) ? 'tamil' : 'english';
                
                if (self.selectedLanguage !== targetLang) {
                  self.selectedLanguage = targetLang;
                  self.dom.btnTamil.setAttribute('aria-pressed', targetLang === 'tamil' ? 'true' : 'false');
                  self.dom.btnEnglish.setAttribute('aria-pressed', targetLang === 'english' ? 'true' : 'false');
                }

                self.selectedPlaylist = track.genre;
                if(self.dom.playlistSelectedLabel) self.dom.playlistSelectedLabel.textContent = self.findPlaylistLabel(track.genre);

                self.activeSet = self.tracks.filter(t => t.genre === track.genre);
                self.currentPlaySet = [...self.activeSet];
                
                const matchIdx = self.currentPlaySet.findIndex(t => t.id === track.id);
                self.loadTrack(matchIdx, true);
                closeAction();
              };

              self.dom.searchResults.appendChild(row);
            });
          };
        },

        playNextTrack: function() {
          const nextIndex = this.currentIndex + 1;
          if(nextIndex !== this.currentPlaySet.length) {
            this.loadTrack(nextIndex, true);
          } else {
            this.loadTrack(0, false); 
          }
        },

        playPreviousTrack: function() {
          const prevIndex = this.currentIndex - 1;
          if(prevIndex >= 0) {
            this.loadTrack(prevIndex, true);
          } else {
            this.loadTrack(this.currentPlaySet.length - 1, true); 
          }
        },

        handleShareIntent: function() {
          const shareUrl = window.location.href;

          if (navigator.share) {
            navigator.share({
              url: shareUrl
            })
            .catch((err) => console.log("Sharing cancelled or failed", err));
          } else {
            navigator.clipboard.writeText(shareUrl)
              .then(() => {
                alert("Playlist link copied to clipboard! Share it with your friends.");
              })
              .catch(() => {
                alert("Could not copy link automatically. Please copy the URL from your browser bar.");
              });
          }
        },

        updateBluetoothControls: function(track) {
          const self = this;
          if ('mediaSession' in navigator) {
            const cleanTitle = track.title.replace(/<\/?[^>]+(>|$)/g, "");

            navigator.mediaSession.metadata = new MediaMetadata({
              title: cleanTitle,
              artist: 'Menora Melodies',
              album: 'Menora Playlists'
            });

            navigator.mediaSession.setActionHandler('nexttrack', () => {
              self.playNextTrack();
            });

            navigator.mediaSession.setActionHandler('previoustrack', () => {
              self.playPreviousTrack();
            });

            navigator.mediaSession.setActionHandler('play', () => {
              self.handlePlaybackToggle();
            });
            navigator.mediaSession.setActionHandler('pause', () => {
              self.handlePlaybackToggle();
            });
          }
        },

        switchLanguageScope: function(targetLang) {
          if(this.selectedLanguage === targetLang) return;
          this.selectedLanguage = targetLang;

          if(targetLang === 'tamil') {
            this.dom.btnTamil.setAttribute('aria-pressed', 'true');
            this.dom.btnEnglish.setAttribute('aria-pressed', 'false');
          } else {
            this.dom.btnTamil.setAttribute('aria-pressed', 'false');
            this.dom.btnEnglish.setAttribute('aria-pressed', 'true');
          }

          this.selectedPlaylist = null;
          this.renderPlaylistOptions(false); 
        },

        flattenLeaves: function(list) {
          let result = [];
          const self = this;
          list.forEach(item => {
            if (item.children) {
              result = result.concat(self.flattenLeaves(item.children));
            } else if (item.value) {
              result.push(item);
            }
          });
          return result;
        },

        findPlaylistLabel: function(value) {
          const search = (list) => {
            for (const item of list) {
              if (item.value === value) return item.label;
              if (item.children) {
                const found = search(item.children);
                if (found) return found;
              }
            }
            return null;
          };
          for (const lang in this.playlistRegistry) {
            const found = search(this.playlistRegistry[lang]);
            if (found) return found;
          }
          return "";
        },

        updateNowPlayingLabel: function(genreValue) {
          if(!this.dom.nowPlayingTag) return;
          const label = this.findPlaylistLabel(genreValue);
          this.dom.nowPlayingTag.textContent = label ? ('NOW PLAYING - ' + label) : 'NOW PLAYING';
        },

        openPlaylistModal: function() {
          if(!this.dom.playlistModal) return;
          this.modalPath = [];
          this.populatePlaylistModalList();
          this.dom.playlistModal.style.display = 'flex';
        },

        closePlaylistModal: function() {
          if(!this.dom.playlistModal) return;
          this.modalPath = [];
          this.dom.playlistModal.style.display = 'none';
        },

        populatePlaylistModalList: function() {
          if(!this.dom.playlistModalList) return;
          this.dom.playlistModalList.innerHTML = "";
          const self = this;

          let currentLevel = this.playlistRegistry[this.selectedLanguage];
          this.modalPath.forEach(node => { currentLevel = node.children; });

          if (this.modalPath.length > 0) {
            const backRow = document.createElement('div');
            backRow.style.cssText = "padding: 7px 10px; border-bottom: 1px solid rgba(70,128,98,0.4); cursor: pointer; font-family: 'Trebuchet MS', Arial; font-size: 15px; font-weight: bold; color: #FFFACD;";
            backRow.innerHTML = "&#8249; BACK &nbsp;&bull;&nbsp; " + this.modalPath.map(n => n.label).join(" / ");
            backRow.onmouseover = () => { backRow.style.background = "rgba(70,128,98,0.15)"; };
            backRow.onmouseout = () => { backRow.style.background = "transparent"; };
            backRow.onclick = () => {
              self.modalPath.pop();
              self.populatePlaylistModalList();
            };
            this.dom.playlistModalList.appendChild(backRow);
          }

          currentLevel.forEach(playlist => {
            const hasChildren = !!playlist.children;
            const isActive = !hasChildren && playlist.value === self.selectedPlaylist;
            const row = document.createElement('div');
            row.style.cssText = "padding: 7px 10px; border-bottom: 1px solid rgba(255, 253, 244, 0.1); cursor: pointer; transition: all 0.2s; font-family: 'Trebuchet MS', Arial; font-size: 14px; font-weight: bold; display:flex; align-items:center; justify-content:space-between; " + (isActive ? "background: rgba(70, 128, 98, 0.3); color: #FFFACD;" : "color: #FFFDF4;");

            row.innerHTML = "<span>" + playlist.label + "</span>" + (hasChildren ? "<span style='opacity:0.7; font-size:26px;'>&#9656;</span>" : "");

            row.onmouseover = () => { if(!isActive) row.style.background = "rgba(70, 128, 98, 0.15)"; };
            row.onmouseout = () => { if(!isActive) row.style.background = "transparent"; };

            row.onclick = () => {
              if (hasChildren) {
                self.modalPath.push(playlist);
                self.populatePlaylistModalList();
              } else {
                self.selectedPlaylist = playlist.value;
                if(self.dom.playlistSelectedLabel) self.dom.playlistSelectedLabel.textContent = playlist.label;
                self.handleCategoryFiltering(false);
                self.closePlaylistModal();
              }
            };

            self.dom.playlistModalList.appendChild(row);
          });
        },

        renderPlaylistOptions: function(isInitialSetup) {
          const optionsList = this.playlistRegistry[this.selectedLanguage];
          const leaves = this.flattenLeaves(optionsList);

          if(!this.selectedPlaylist || !leaves.some(p => p.value === this.selectedPlaylist)) {
            this.selectedPlaylist = leaves.length ? leaves[0].value : null;
          }

          if(this.dom.playlistSelectedLabel) {
            this.dom.playlistSelectedLabel.textContent = this.findPlaylistLabel(this.selectedPlaylist) || 'Select Playlist';
          }

          this.handleCategoryFiltering(isInitialSetup);
        },

        handleCategoryFiltering: function(isInitialSetup) {
  if(!this.selectedPlaylist) return;
  const chosenValue = this.selectedPlaylist;
  this.activeSet = this.tracks.filter(t => t.genre === chosenValue);
  
  this.updateLyricsButtonVisibility();
  this.renderMiniQueue();

  const isCurrentlyPlaying = this.dom.engine && !this.dom.engine.paused;

  if (!isCurrentlyPlaying) {
    this.currentPlaySet = [...this.activeSet];
    const firstPlayableIdx = this.currentPlaySet.findIndex(t => !t.isCredit);
    this.loadTrack(firstPlayableIdx >= 0 ? firstPlayableIdx : 0, false);
  }
},

        loadTrack: function(idx, triggerPlayback) {
          if(this.currentPlaySet.length === 0) return;
          this.currentIndex = idx;
          const track = this.currentPlaySet[this.currentIndex];

          this.updateNowPlayingLabel(track.genre);

          if(track.isCredit) {
            if(this.dom.engine) {
              this.dom.engine.pause();
              this.dom.engine.src = "";
            }
            if(this.dom.title) this.dom.title.innerHTML = track.title; 
            if(this.dom.bar) this.dom.bar.value = 0;
            if(this.dom.current) this.dom.current.textContent = "0:00";
            if(this.dom.duration) this.dom.duration.textContent = "0:00";
            if(this.dom.playPause) this.dom.playPause.innerHTML = "<b>PLAY</b>";
            
            this.renderMiniQueue();
            return;
          }

          const activeTrackNum = this.currentPlaySet
            .slice(0, this.currentIndex + 1)
            .filter(t => !t.isCredit).length;

          if(this.dom.engine) this.dom.engine.src = track.url;
          if(this.dom.title) this.dom.title.innerHTML = activeTrackNum + ". " + track.title;
          if(this.dom.bar) this.dom.bar.value = 0;
          if(this.dom.current) this.dom.current.textContent = "0:00";

          if(triggerPlayback) {
            if(this.dom.engine) this.dom.engine.play().catch(() => {});
            if(this.dom.playPause) this.dom.playPause.innerHTML = "<b>PAUSE</b>";
            if('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
          } else {
            if(this.dom.playPause) this.dom.playPause.innerHTML = "<b>PLAY</b>";
            if('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
          }
          
          if (this.lyricsSongs.length > 0) {
            const actualSongIndex = this.currentPlaySet.slice(0, this.currentIndex + 1).filter(t => !t.isCredit).length - 1;
            if (actualSongIndex >= 0 && actualSongIndex < this.lyricsSongs.length) {
              this.lyricsActiveIndex = actualSongIndex;
              this.renderLyricsTabs();
              this.renderLyricsContent();
            }
          }

          this.updateBluetoothControls(track);
          this.renderMiniQueue();
        },

        handlePlaybackToggle: function() {
          const track = this.currentPlaySet[this.currentIndex];
          if(track && track.isCredit) return;

          if(!this.dom.engine.src && this.currentPlaySet.length > 0) {
            this.loadTrack(0, true);
            return;
          }
          if(this.dom.engine.paused) {
            this.dom.engine.play().catch(() => {});
            if(this.dom.playPause) this.dom.playPause.innerHTML = "<b>PAUSE</b>";
            if('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
          } else {
            this.dom.engine.pause();
            if(this.dom.playPause) this.dom.playPause.innerHTML = "<b>PLAY</b>";
            if('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
          }
        },

        handleManualSeeking: function() {
          const track = this.currentPlaySet[this.currentIndex];
          if(track && track.isCredit) return;

          if(this.dom.engine.duration && this.dom.bar) {
            this.dom.engine.currentTime = (this.dom.bar.value / 100) * this.dom.engine.duration;
          }
        },

        updateLyricsButtonVisibility: function() {
          const lyricsCredit = this.activeSet.find(t => t.isCredit && t.openLyrics);
          this.currentLyricsGenre = lyricsCredit ? lyricsCredit.genre : null;
          if(this.dom.viewLyricsBtn) {
            this.dom.viewLyricsBtn.style.display = this.currentLyricsGenre ? 'inline-block' : 'none';
          }
        },

        openLyricsPanel: function(genreKey, targetSongIdx = 0) {
          const self = this;
          this.lyricsSongs = [];
          this.lyricsActiveIndex = targetSongIdx;

          if(this.dom.lyricsHeaderTitle) this.dom.lyricsHeaderTitle.textContent = 'LYRICS - ' + (this.findPlaylistLabel(genreKey) || genreKey);
          if(this.dom.lyricsSongText) this.dom.lyricsSongText.textContent = 'Loading lyrics...';
          if(this.dom.lyricsTabStrip) this.dom.lyricsTabStrip.innerHTML = '';
          if(this.dom.lyricsOverlay) this.dom.lyricsOverlay.classList.add('open');

          const lyricsUrl = 'https://raw.githubusercontent.com/menoradotin/MENORA/refs/heads/main/' + encodeURIComponent(genreKey) + '.json?v=' + Date.now();

          fetch(lyricsUrl)
            .then(response => {
              if(!response.ok) throw new Error('Lyrics file not found');
              return response.json();
            })
            .then(data => {
              self.lyricsSongs = data;
              if(self.lyricsSongs.length === 0) {
                if(self.dom.lyricsSongText) self.dom.lyricsSongText.textContent = 'No lyrics added for this playlist yet.';
                return;
              }
              self.renderLyricsTabs();
              self.renderLyricsContent();
            })
            .catch(err => {
              console.error('Error loading lyrics:', err);
              if(self.dom.lyricsSongText) self.dom.lyricsSongText.textContent = 'Lyrics for this playlist are not available yet.';
            });
        },

        closeLyricsPanel: function() {
          if(this.dom.lyricsOverlay) this.dom.lyricsOverlay.classList.remove('open');
        },

        renderLyricsTabs: function() {
          if(!this.dom.lyricsTabStrip) return;
          this.dom.lyricsTabStrip.innerHTML = '';
          const self = this;
          this.lyricsSongs.forEach((song, idx) => {
            const btn = document.createElement('button');
            btn.className = 'menoraLyrics-tab' + (idx === self.lyricsActiveIndex ? ' active' : '');
            btn.textContent = song.number;
            btn.onclick = () => {
              self.lyricsActiveIndex = idx;
              self.renderLyricsTabs();
              self.renderLyricsContent();
            };
            self.dom.lyricsTabStrip.appendChild(btn);

            if (idx === self.lyricsActiveIndex) {
              setTimeout(() => {
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
              }, 50);
            }
          });
        },

        renderLyricsContent: function() {
          const song = this.lyricsSongs[this.lyricsActiveIndex];
          if(!song) return;
          if(this.dom.lyricsSongTitle) this.dom.lyricsSongTitle.textContent = song.number + '. ' + song.title;
          if(this.dom.lyricsSongText) this.dom.lyricsSongText.textContent = song.lyrics || 'Lyrics coming soon.';
          if(this.dom.lyricsBodyScroll) this.dom.lyricsBodyScroll.scrollTop = 0;
        },

        renderMiniQueue: function() {
          if(!this.dom.miniQueue) return;
          this.dom.miniQueue.innerHTML = "";
          
          if(this.activeSet.length === 0) {
            this.dom.miniQueue.innerHTML = `<div class="menora-mini-item" style="color:#4f5f6e; font-style:italic;">No tracks loaded</div>`;
            return;
          }
          
          const self = this;
          const currentTrack = this.currentPlaySet[this.currentIndex];

          this.activeSet.forEach((track, index) => {
            if(track.isCredit && track.openLyrics) return;

            const row = document.createElement('div');
            row.className = "menora-mini-item";
            
            if(currentTrack && track.id === currentTrack.id) {
              row.className += " playing-now-active";
            }

            if(track.isCredit) {
              row.style.textAlign = "center";
              row.style.fontWeight = "bold";

              if(track.link) {
                row.innerHTML = `<a href="${track.link}" target="_blank" rel="noopener noreferrer" style="color:#00643C; text-decoration:underline;">${track.title}</a>`;
                row.onclick = (e) => {
                  e.stopPropagation();
                };
              } else {
                row.innerHTML = track.title;
                row.onclick = null;
              }
            } else {
              const songNumber = this.activeSet.slice(0, index + 1).filter(t => !t.isCredit).length;
              row.innerHTML = songNumber + ". " + track.title;

              row.onclick = () => {
                self.currentPlaySet = [...self.activeSet];
                const matchIdx = self.currentPlaySet.findIndex(t => t.id === track.id);
                self.loadTrack(matchIdx, true);
              };
            }
            self.dom.miniQueue.appendChild(row);
          });
        },

        formatTrackTime: function(secs) {
          const min = Math.floor(secs / 60);
          const sec = Math.floor(secs % 60);
          const extraZero = (sec === 0 || sec < 10) ? "0" : "";
          return min + ":" + extraZero + sec;
        }
      };

      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', () => menoraAudioContext.setup());
      } else {
        menoraAudioContext.setup();
      }
    })();
</script>
